<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .title }} — Акты осмотра</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <h1>Регистрация</h1>
        <p class="auth-subtitle">Создание аккаунта</p>

        {{ if .error }}
        <div class="alert alert-error">{{ .error }}</div>
        {{ end }}

        <form method="POST" action="/register">
            <div class="form-group">
                <label for="full_name">ФИО полностью</label>
                <input type="text" id="full_name" name="full_name" required
                       placeholder="Иванов Иван Иванович" autocomplete="name">
                <span class="form-hint" id="initials-preview" style="color:var(--text-muted)"></span>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required
                       placeholder="example@mail.ru">
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <div class="password-input-wrap">
                    <input type="password" id="password" name="password" required
                           placeholder="Минимум 6 символов">
                    <button type="button" class="password-toggle" tabindex="-1" aria-label="Показать пароль" onclick="togglePwd('password',this)">
                        <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label for="confirm_password">Подтверждение пароля</label>
                <div class="password-input-wrap">
                    <input type="password" id="confirm_password" name="confirm_password" required
                           placeholder="Повторите пароль">
                    <button type="button" class="password-toggle" tabindex="-1" aria-label="Показать пароль" onclick="togglePwd('confirm_password',this)">
                        <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
                <span class="form-hint" id="confirm-hint" style="color:#ef4444;margin-top:4px;display:block"></span>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Создать аккаунт</button>
        </form>

        <p class="auth-link">Уже есть аккаунт? <a href="/login">Войти</a></p>
    </div>
<script>
(function() {
    function toInitials(fullName) {
        const parts = fullName.trim().split(/\s+/).filter(Boolean);
        if (!parts.length) return '';
        let r = parts[0];
        for (let i = 1; i < parts.length && i <= 2; i++) {
            const ch = [...parts[i]][0];
            if (ch) r += ' ' + ch + '.';
        }
        return r;
    }
    const inp = document.getElementById('full_name');
    const hint = document.getElementById('initials-preview');
    inp.addEventListener('input', function() {
        const v = toInitials(this.value);
        hint.textContent = v ? 'В подписи: ' + v : '';
    });

    // Password match validation
    const pwd = document.getElementById('password');
    const confirm = document.getElementById('confirm_password');
    const confirmHint = document.getElementById('confirm-hint');
    function checkMatch() {
        if (confirm.value && pwd.value !== confirm.value) {
            confirmHint.textContent = 'Пароли не совпадают';
            confirm.setCustomValidity('Пароли не совпадают');
        } else {
            confirmHint.textContent = '';
            confirm.setCustomValidity('');
        }
    }
    pwd.addEventListener('input', checkMatch);
    confirm.addEventListener('input', checkMatch);
})();

function togglePwd(id, btn) {
    const input = document.getElementById(id);
    const show = input.type === 'password';
    input.type = show ? 'text' : 'password';
    btn.querySelector('.eye-open').style.display = show ? 'none' : 'inline';
    btn.querySelector('.eye-closed').style.display = show ? 'inline' : 'none';
}
</script>
</body>
</html>
