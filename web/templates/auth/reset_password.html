<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .title }} — Акты осмотра</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <script>(function(){var t=localStorage.getItem("theme");if(t)document.documentElement.setAttribute("data-theme",t);})()</script>
</head>
<body class="auth-page">
    <div class="auth-container">
        <h1>Новый пароль</h1>
        <p class="auth-subtitle">Введите код из письма и новый пароль</p>

        {{ if .error }}
        <div class="alert alert-error">{{ .error }}</div>
        {{ end }}

        <form method="POST" action="/reset-password">
            <input type="hidden" name="email" value="{{ .email }}">
            <div class="form-group">
                <label for="code">Код из письма</label>
                <input type="text" id="code" name="code" maxlength="6" inputmode="numeric"
                       pattern="[0-9]{6}" required placeholder="000000" autocomplete="one-time-code">
            </div>
            <div class="form-group">
                <label for="password">Новый пароль</label>
                <input type="password" id="password" name="password" required placeholder="••••••" minlength="6">
            </div>
            <div class="form-group">
                <label for="confirm">Повторите пароль</label>
                <input type="password" id="confirm" name="confirm" required placeholder="••••••" minlength="6">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Сменить пароль</button>
        </form>

        <p class="auth-link" style="margin-top:16px"><a href="/forgot-password">← Запросить новый код</a></p>
    </div>
</body>
</html>
