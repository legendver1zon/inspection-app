<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .title }} — Акты осмотра</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
</head>
<body class="auth-page">
    <div class="auth-container">
        <h1>Восстановление пароля</h1>
        <p class="auth-subtitle">Введите email — пришлём код для сброса</p>

        {{ if .error }}
        <div class="alert alert-error">{{ .error }}</div>
        {{ end }}

        {{ if .sent }}
        <div class="alert alert-success">
            Если аккаунт с таким email существует — письмо с кодом уже отправлено.<br>
            Проверьте входящие (и папку «Спам»). Код действует 15 минут.
        </div>
        <form method="POST" action="/reset-password">
            <input type="hidden" name="email" value="{{ .email }}">
            <div class="form-group">
                <label for="code">Код из письма</label>
                <input type="text" id="code" name="code" maxlength="6" inputmode="numeric"
                       pattern="[0-9]{6}" required placeholder="000000" autocomplete="one-time-code">
            </div>
            <div class="form-group">
                <label for="password">Новый пароль</label>
                <input type="password" id="password" name="password" required placeholder="••••••" minlength="6">
            </div>
            <div class="form-group">
                <label for="confirm">Повторите пароль</label>
                <input type="password" id="confirm" name="confirm" required placeholder="••••••" minlength="6">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Сменить пароль</button>
        </form>
        {{ else }}
        <form method="POST" action="/forgot-password">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="example@mail.ru">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Отправить код</button>
        </form>
        {{ end }}

        <p class="auth-link" style="margin-top:16px"><a href="/login">← Назад к входу</a></p>
    </div>
</body>
</html>
