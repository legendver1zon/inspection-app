version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: inspection_db
      POSTGRES_USER: inspection
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inspection -d inspection_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/legendver1zon/inspection-app:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://inspection:secret@postgres:5432/inspection_db?sslmode=disable
      GIN_MODE: release
    ports:
      - "8080:8080"
    volumes:
      - ./web/static/uploads:/app/web/static/uploads
      - ./web/static/documents:/app/web/static/documents

volumes:
  pgdata:
