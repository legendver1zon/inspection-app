services:
  - type: web
    name: inspection-app
    runtime: go
    buildCommand: >-
      apt-get install -y fonts-liberation fonts-liberation2 2>/dev/null;
      mkdir -p internal/pdf/fonts;
      find /usr/share/fonts -name "LiberationSans-Regular.ttf" 2>/dev/null | head -1 | xargs -I{} cp {} internal/pdf/fonts/font.ttf;
      find /usr/share/fonts -name "LiberationSans-Bold.ttf" 2>/dev/null | head -1 | xargs -I{} cp {} internal/pdf/fonts/font_bold.ttf;
      go build -o app ./cmd/server
    startCommand: ./app
